name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          tools: composer:v2

      - uses: ramsey/composer-install@v3

      - name: Run lint
        run: composer lint

      - name: Run static analysis
        run: composer analyse

      - name: Run PHPUnit
        run: composer test

      - name: Run package integration suite
        run: composer test:package
