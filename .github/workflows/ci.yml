name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            php: '8.2'
          - os: ubuntu-latest
            php: '8.3'
          - os: ubuntu-latest
            php: '8.4'
          - os: windows-latest
            php: '8.3'
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          tools: composer:v2

      - uses: ramsey/composer-install@v3

      - name: Run lint
        run: composer lint

      - name: Run static analysis
        run: composer analyse

      - name: Run PHPUnit
        run: composer test

      - name: Run package integration suite
        run: composer test:package
